set -g default-terminal "tmux-256color"
set -s escape-time 0
set -g base-index 1

unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection

if-shell -b 'command -v pbcopy >/dev/null 2>&1' \
    'bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"' \
    'bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"'

bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"

bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

bind-key -r f run-shell "tmux neww tmuxs"
bind-key X confirm-before -p "Kill current session? (y/n)" kill-session
bind-key o switch-client -l

set -g status-position bottom
set -g status-style "bg=#111827,fg=#e5e7eb"

set -g status-left-length 40
set -g status-left "#[bg=#f59e0b,fg=#111827,bold] #S #[bg=#111827,fg=#f59e0b] | "

set -g status-right-style "bg=#111827,fg=#9ca3af"

set -g window-status-style "bg=#111827,fg=#9ca3af"
set -g window-status-current-style "bg=#2563eb,fg=#ffffff,bold"

set -g pane-border-style "fg=#374151"
set -g pane-active-border-style "fg=#60a5fa"

set -g message-style "bg=#2563eb,fg=#ffffff,bold"
set -g mode-style "bg=#2563eb,fg=#ffffff,bold"
